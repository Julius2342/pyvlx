name: CI
on:
  workflow_dispatch: # allow manual triggering
  push:
    branches:
      - '**' # run on all branches
    tags:
      - '*'  # run on tag pushes so it can trigger the publish workflow
  pull_request:
    branches:
      - '**' # run on all branches
jobs:
  pydocstyle:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"        
    - name: Cache pip packages
      uses: actions/cache@v5
      env:
        cache-name: cache-pypi-modules
      with:
        # pip cache files are stored in `~/.cache/pip` on Linux
        path: ~/.cache/pip
        key: ${{ runner.os }}-pydocstyle-${{ env.cache-name }}-${{ hashFiles('pyproject.toml', 'requirements/production.in', 'requirements/testing.in', 'requirements/production.txt', 'requirements/testing.txt') }}
        restore-keys: |
          ${{ runner.os }}-pydocstyle-${{ env.cache-name }}-
    - name: Install dependencies
      run: pip install -r requirements/testing.txt
    - name: Pydocstyle
      run: pydocstyle pyvlx test/*.py examples/*.py
  flake8:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Cache pip packages
      uses: actions/cache@v5
      env:
        cache-name: cache-pypi-modules
      with:
        # pip cache files are stored in `~/.cache/pip` on Linux
        path: ~/.cache/pip
        key: ${{ runner.os }}-flake8-${{ env.cache-name }}-${{ hashFiles('pyproject.toml', 'requirements/production.in', 'requirements/testing.in', 'requirements/production.txt', 'requirements/testing.txt') }}
        restore-keys: |
          ${{ runner.os }}-flake8-${{ env.cache-name }}-
    - name: Install dependencies
      run: pip install -r requirements/testing.txt
    - name: Flake8
      run: flake8 
  pylint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Cache pip packages
      uses: actions/cache@v5
      env:
        cache-name: cache-pypi-modules
      with:
        # pip cache files are stored in `~/.cache/pip` on Linux
        path: ~/.cache/pip
        key: ${{ runner.os }}-pylint-${{ env.cache-name }}-${{ hashFiles('pyproject.toml', 'requirements/production.in', 'requirements/testing.in', 'requirements/production.txt', 'requirements/testing.txt') }}
        restore-keys: |
          ${{ runner.os }}-pylint-${{ env.cache-name }}-
    - name: Install dependencies
      run: pip install -r requirements/testing.txt
    - name: Linter Pylint
      run: pylint pyvlx test/*.py examples/*.py
  isort:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.x
      uses: actions/setup-python@v6
      with:
        python-version: "3.x"
    - name: Cache pip packages
      uses: actions/cache@v5
      env:
        cache-name: cache-pypi-modules
      with:
        # pip cache files are stored in `~/.cache/pip` on Linux
        path: ~/.cache/pip
        key: ${{ runner.os }}-isort-${{ env.cache-name }}-${{ hashFiles('pyproject.toml', 'requirements/production.in', 'requirements/testing.in', 'requirements/production.txt', 'requirements/testing.txt') }}
        restore-keys: |
          ${{ runner.os }}-isort-${{ env.cache-name }}-
    - name: Install dependencies
      run: pip install -r requirements/testing.txt
    - name: Isort
      run: isort --check-only test examples pyvlx
  mypy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache pip packages
      uses: actions/cache@v5
      env:
        cache-name: cache-pypi-modules
      with:
        # pip cache files are stored in `~/.cache/pip` on Linux
        path: ~/.cache/pip
        key: ${{ runner.os }}-mypy-${{ env.cache-name }}-${{ hashFiles('pyproject.toml', 'requirements/production.in', 'requirements/testing.in', 'requirements/production.txt', 'requirements/testing.txt') }}
        restore-keys: |
          ${{ runner.os }}-mypy-${{ env.cache-name }}-
    - name: Install dependencies
      run: pip install -r requirements/testing.txt
    - name: Mypy
      run: mypy pyvlx
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache pip packages
      uses: actions/cache@v5
      env:
        cache-name: cache-pypi-modules
      with:
        # pip cache files are stored in `~/.cache/pip` on Linux
        path: ~/.cache/pip
        key: ${{ runner.os }}-pytest-${{ env.cache-name }}-${{ hashFiles('pyproject.toml', 'requirements/production.in', 'requirements/testing.in', 'requirements/production.txt', 'requirements/testing.txt') }}
        restore-keys: |
          ${{ runner.os }}-pytest-${{ env.cache-name }}-
    - name: Install dependencies
      run: pip install -r requirements/testing.txt
    - name: pytest
      # run the tests, produce a .coverage.$pyversion file
      run: pytest --cov 
      env:
        COVERAGE_FILE: ".coverage.${{ matrix.python-version }}"
        # The file name prefix must be ".coverage." for "coverage combine"
        # enabled by "MERGE_COVERAGE_FILES: true" to work. A "subprocess"
        # error with the message "No data to combine" will be triggered if
        # this prefix is not used.
    - name: Store coverage file
      uses: actions/upload-artifact@v7
      with:
        name: coverage-${{ matrix.python-version }}
        path: .coverage.${{ matrix.python-version }}
        # By default hidden files/folders (i.e. starting with .) are ignored.
        # You may prefer (for security reasons) not setting this and instead
        # set COVERAGE_FILE above to not start with a `.`, but you cannot
        # use "MERGE_COVERAGE_FILES: true" later on and need to manually
        # combine the coverage file using "pipx run coverage combine"
        include-hidden-files: true

  coverage:
    name: Generate Coverage comment
    runs-on: ubuntu-latest
    needs: pytest
    steps:
      - uses: actions/checkout@v6
        with:
          # This is optional since by default it's to true. The git
          # operations in python-coverage-comment-action utilize the token
          # stored by actions/checkout.
          persist-credentials: true

      - uses: actions/download-artifact@v8
        id: download
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_COVERAGE_FILES: true

      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@v7
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt


  notify-build:
    name: Notify build and publish workflow 
    runs-on: ubuntu-latest
    needs: ["pydocstyle","flake8", "pylint", "mypy", "pytest", "isort"]
    steps:
    - name: Notify publish workflow
      # dispatch publish workflow when triggered by tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: peter-evans/repository-dispatch@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: ci-workflow-found-tag
        client-payload: '{"tag":"${{ github.ref_name }}", "sha":"${{ github.sha }}"}'

